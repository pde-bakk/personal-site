name: Docker Image CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Build the Docker image
      run: make up
    - name: Build the Docker image in production
      run: |
        echo "NODE_ENV=production" > ./app/.env.prod
        make up PROD=1
